<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Awesome Frontend Reference Gallery</title>
    <meta
      name="description"
      content="一个适合浏览前端设计参考、画廊站点、组件资源与 skills 的 GitHub Pages collection。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/site.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand mono">Awesome Frontend Reference</div>
        <h1>把 collection 做成真的 gallery。</h1>
        <p class="sidebar-copy">
          这里收集前端设计参考、完整站点、画廊站点、组件库和 skills。页面直接读取
          <a href="data/sites.json">sites.json</a>，适合继续扩展。
        </p>

        <div class="sidebar-meta">
          <div class="meta-block">
            <span class="meta-label mono">items</span>
            <strong class="meta-value" id="site-count">--</strong>
          </div>
          <div class="meta-block">
            <span class="meta-label mono">categories</span>
            <strong class="meta-value" id="category-count">--</strong>
          </div>
          <div class="meta-block">
            <span class="meta-label mono">capture</span>
            <strong class="meta-value meta-date" id="capture-date">--</strong>
          </div>
        </div>

        <input id="search" class="search" placeholder="Search site name..." />

        <div class="chips" id="chips"></div>

        <div class="sidebar-links">
          <a href="README.md">README</a>
          <a href="README_cn.md">README_CN</a>
          <a href="https://github.com/zenghao-stat/awsome-frontend-reference" target="_blank" rel="noreferrer">GitHub</a>
        </div>
      </aside>

      <main class="main-panel">
        <header class="toolbar">
          <div>
            <p class="toolbar-kicker mono">Gallery Browser</p>
            <h2 id="current-title">全部</h2>
            <p id="current-desc" class="toolbar-desc">浏览整个 collection。</p>
          </div>
          <div class="toolbar-side">
            <span id="result-count" class="result-count">0 results</span>
            <a class="toolbar-link" href="https://zenghao-stat.github.io/awsome-frontend-reference/">Live</a>
          </div>
        </header>

        <section class="grid" id="grid">
          <p class="loading-state">正在加载 collection...</p>
        </section>
      </main>
    </div>

    <template id="site-card-template">
      <article class="card">
        <a class="card-shot" target="_blank" rel="noreferrer">
          <img alt="" loading="lazy" />
        </a>
        <div class="card-body">
          <div class="card-header">
            <div class="card-title-wrap">
              <a class="card-title" target="_blank" rel="noreferrer"></a>
              <p class="card-url"></p>
            </div>
            <span class="card-badge"></span>
          </div>
          <p class="card-intro"></p>
          <p class="card-note" hidden></p>
        </div>
      </article>
    </template>

    <script src="assets/site.js" defer></script>
  </body>
</html>
